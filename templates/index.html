<!DOCTYPE html>
<html>
<head>
    <title>EdTech Chatbot</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #ece5dd;
        }

        #container {
            width: 100%;
            max-width: 500px;
            margin: auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
            border: 1px solid #ccc;
        }

        #header {
            background: #075e54;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 18px;
        }

        #messages {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
            background: #e5ddd5;
        }

        .message {
            margin: 8px 0;
            max-width: 75%;
            padding: 10px;
            border-radius: 10px;
            word-wrap: break-word;
        }

        .user {
            background: #dcf8c6;
            margin-left: auto;
            text-align: right;
        }

        .bot {
            background: white;
            margin-right: auto;
            text-align: left;
        }

        #inputArea {
            display: flex;
            padding: 10px;
            background: #f0f0f0;
        }

        input {
            flex: 1;
            padding: 10px;
            border-radius: 20px;
            border: 1px solid #ccc;
            outline: none;
        }

        button {
            margin-left: 10px;
            padding: 10px 15px;
            border: none;
            background: #075e54;
            color: white;
            border-radius: 50%;
            cursor: pointer;
        }

        button:hover {
            background: #0b7a6e;
        }
    </style>
</head>
<body>

<div id="container">
    <div id="header">EdTech Chatbot</div>

    <div id="messages"></div>

    <div id="inputArea">
        <input type="text" id="userInput" placeholder="Type a message..." onkeypress="handleKey(event)">
        <button onclick="sendMessage()">➤</button>
    </div>
</div>

<script>
function sendMessage() {
    let input = document.getElementById("userInput");
    let message = input.value;

    if (message.trim() === "") return;

    let messages = document.getElementById("messages");

    messages.innerHTML += `<div class='message user'>${message}</div>`;

    fetch("/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ message: message })
    })
    .then(response => response.json())
    .then(data => {
        messages.innerHTML += `<div class='message bot'>${data.response}</div>`;
        messages.scrollTop = messages.scrollHeight;
    });

    input.value = "";
}

function handleKey(event) {
    if (event.key === "Enter") {
        sendMessage();
    }
}
</script>

</body>
</html>
